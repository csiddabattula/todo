<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Todo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      margin: 0; padding: 0; min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .controls, .controls2 {
      padding: 18px 20px 10px;
      background: #fafafa;
      display: flex;
      gap: 10px;
    }
    .controls2 { padding-top: 0; padding-bottom: 10px; }
    input[type="text"] {
      flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0;
      border-radius: 12px; font-size: 15px; outline: none;
    }
    input:focus { border-color: #6366f1; }

    button {
      padding: 12px 20px; background: #4f46e5; color: white;
      border: none; border-radius: 12px; cursor: pointer; font-weight: 500;
    }
    button:hover { background: #4338ca; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }

    .stats { 
      padding: 6px 20px 12px; 
      font-size: 13px; 
      color: #64748b; 
      display: flex; 
      justify-content: space-between; 
      background: #fafafa; 
    }

    .todo-list {
      max-height: 460px; 
      overflow-y: auto; 
      padding: 8px 12px 20px;
      scrollbar-width: thin; 
      scrollbar-color: #6366f1 #f1f5f9;
    }
    .todo-list::-webkit-scrollbar { width: 5px; }
    .todo-list::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 20px; }

    .task {
      padding: 10px 16px; 
      margin: 5px 6px; 
      background: #f8fafc;
      border: 1px solid #e6e9ef; 
      border-radius: 12px;
      display: flex; 
      align-items: center; 
      gap: 12px; 
      cursor: grab;
      min-height: 48px; 
      transition: all 0.2s;
    }
    .task:hover { background: #f1f5f9; }
    .task.completed { 
      opacity: 0.85; 
      text-decoration: line-through; 
      color: #64748b; 
    }

    input[type="checkbox"] { 
      width: 18px; height: 18px; accent-color: #4f46e5; cursor: pointer; 
    }
    .task-text { flex: 1; font-size: 15px; }

    /* Icon Buttons */
    .icon-btn {
      background: none; 
      border: none; 
      cursor: pointer; 
      padding: 6px 8px;
      font-size: 18px; 
      opacity: 0.75; 
      border-radius: 6px;
    }
    .icon-btn:hover { 
      opacity: 1; 
      background: #e2e8f0; 
    }
    .edit-btn { color: #6366f1; }
    .delete-btn { color: #ef4444; }

    /* Inline Edit Input */
    .edit-input {
      flex: 1;
      padding: 6px 10px;
      font-size: 15px;
      border: 2px solid #6366f1;
      border-radius: 8px;
    }

    /* Bottom Action Bar */
    .action-bar {
      padding: 14px 20px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .action-bar button {
      padding: 9px 18px;
      font-size: 13.5px;
    }

    .empty-state { 
      text-align: center; 
      padding: 70px 20px; 
      color: #94a3b8; 
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h2 style="margin:0; font-size:20px;">Minimal Todo</h2>
      <button id="authBtn">Sign in with Google</button>
    </div>

    <div class="controls">
      <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
      <button id="addBtn">Add</button>
    </div>

    <div class="controls2">
      <input type="text" id="searchInput" placeholder="Search tasks..." autocomplete="off">
    </div>

    <div class="stats">
      <span id="taskCount">0 tasks</span>
      <span id="completedCount">0 completed</span>
    </div>

    <div class="todo-list" id="todoList"></div>

    <!-- Bottom Action Bar -->
    <div class="action-bar">
      <button id="deleteSelectedBtn" class="danger">Delete Selected</button>
      <button id="clearCompletedBtn" class="danger">Clear All Completed</button>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    const CLIENT_ID = '761538208665-c1aj3m7to7ouqikscteh8fqqao27f14m.apps.googleusercontent.com';
    const FILE_NAME = 'todos.json';
    let tokenClient, accessToken = null;
    let tasks = [];
    let editingId = null;

    // ====================== Google Auth ======================
    function initGoogle() {
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse
      });

      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: (resp) => {
          if (resp.access_token) {
            accessToken = resp.access_token;
            document.getElementById("authBtn").textContent = "Connected ✓";
            document.getElementById("authBtn").disabled = true;
            loadFromDrive();
          }
        }
      });

      google.accounts.id.renderButton(document.getElementById("authBtn"), 
        { theme: "filled_blue", size: "medium", text: "signin_with" });
    }

    async function handleCredentialResponse(response) {
      tokenClient.requestAccessToken();
    }

    // ====================== Google Drive ======================
    async function loadFromDrive() {
      if (!accessToken) return;
      try {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'&fields=files(id)`, {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        const data = await res.json();
        const fileId = data.files?.[0]?.id;

        if (!fileId) { tasks = []; renderTasks(); return; }

        const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        tasks = fileRes.ok ? await fileRes.json() : [];
        renderTasks();
      } catch (e) { console.error(e); }
    }

    async function saveToDrive() {
      if (!accessToken) return;
      try {
        const fileId = await getFileId();
        const metadata = { name: FILE_NAME, mimeType: 'application/json' };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([JSON.stringify(tasks)], { type: 'application/json' }));

        let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
        let method = 'POST';
        if (fileId) {
          url = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`;
          method = 'PATCH';
        }

        await fetch(url, {
          method: method,
          headers: { Authorization: `Bearer ${accessToken}` },
          body: form
        });
      } catch (e) { console.error(e); }
    }

    async function getFileId() {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}'&fields=files(id)`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const data = await res.json();
      return data.files?.[0]?.id || null;
    }

    // ====================== Todo Functions ======================
    function generateId() {
      return 'task_' + Date.now() + Math.random().toString(36).substr(2, 5);
    }

    function addTask(text) {
      if (!text.trim() || !accessToken) return;
      tasks.push({
        id: generateId(),
        text: text.trim(),
        completed: false,
        order: Date.now()
      });
      saveToDrive();
      document.getElementById("taskInput").value = "";
      renderTasks();
    }

    function renderTasks(filter = "") {
      const container = document.getElementById("todoList");
      container.innerHTML = "";

      let filtered = [...tasks].sort((a, b) => a.order - b.order);
      if (filter) {
        const term = filter.toLowerCase();
        filtered = filtered.filter(t => t.text.toLowerCase().includes(term));
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><p>No tasks${filter ? ' found' : ''}</p></div>`;
        updateStats();
        return;
      }

      filtered.forEach(task => {
        const div = document.createElement("div");
        div.className = `task ${task.completed ? 'completed' : ''}`;
        div.draggable = true;
        div.dataset.id = task.id;

        if (editingId === task.id) {
          // Inline Edit Mode
          div.innerHTML = `
            <input type="text" class="edit-input" value="${task.text}" autofocus>
            <button class="icon-btn" style="color:#10b981">Save</button>
            <button class="icon-btn delete-btn">Cancel</button>
          `;

          const editInput = div.querySelector(".edit-input");
          editInput.focus();
          editInput.select();

          div.querySelectorAll("button")[0].onclick = () => {
            const newText = editInput.value.trim();
            if (newText) {
              task.text = newText;
              saveToDrive();
            }
            editingId = null;
            renderTasks(document.getElementById("searchInput").value);
          };

          div.querySelectorAll("button")[1].onclick = () => {
            editingId = null;
            renderTasks(document.getElementById("searchInput").value);
          };
        } else {
          // Normal View
          div.innerHTML = `
            <input type="checkbox" ${task.completed ? 'checked' : ''}>
            <span class="task-text">${task.text}</span>
            <button class="icon-btn edit-btn" title="Edit">✏️</button>
            <button class="icon-btn delete-btn" title="Delete">🗑️</button>
          `;

          div.querySelector("input[type='checkbox']").onchange = () => toggleComplete(task.id);
          div.querySelector(".edit-btn").onclick = () => startEditing(task.id);
          div.querySelector(".delete-btn").onclick = () => deleteTask(task.id);
        }

        // Drag & Drop
        div.addEventListener("dragstart", e => {
          e.dataTransfer.setData("text/plain", task.id);
          div.classList.add("dragging");
        });
        div.addEventListener("dragend", () => div.classList.remove("dragging"));

        container.appendChild(div);
      });

      setupDragAndDrop(container);
      updateStats();
    }

    function startEditing(id) {
      editingId = id;
      renderTasks(document.getElementById("searchInput").value);
    }

    function toggleComplete(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        if (task.completed) task.order = Date.now() + 1000000;
        saveToDrive();
        renderTasks(document.getElementById("searchInput").value);
      }
    }

    function deleteTask(id) {
      if (!confirm("Delete this task?")) return;
      tasks = tasks.filter(t => t.id !== id);
      saveToDrive();
      renderTasks(document.getElementById("searchInput").value);
    }

    function deleteSelected() {
      if (!confirm("Delete all selected tasks?")) return;
      const checkedIds = Array.from(document.querySelectorAll('.task input[type="checkbox"]:checked'))
                            .map(chk => chk.parentElement.dataset.id);
      tasks = tasks.filter(t => !checkedIds.includes(t.id));
      saveToDrive();
      renderTasks(document.getElementById("searchInput").value);
    }

    function clearCompleted() {
      if (!confirm("Clear all completed tasks?")) return;
      tasks = tasks.filter(t => !t.completed);
      saveToDrive();
      renderTasks(document.getElementById("searchInput").value);
    }

    function updateStats() {
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      document.getElementById("taskCount").textContent = `${total} tasks`;
      document.getElementById("completedCount").textContent = `${completed} completed`;
    }

    // Drag & Drop Setup
    function setupDragAndDrop(container) {
      container.addEventListener("dragover", e => {
        e.preventDefault();
        const dragging = document.querySelector(".dragging");
        if (!dragging) return;

        const afterElement = getDragAfterElement(container, e.clientY);
        if (afterElement) {
          container.insertBefore(dragging, afterElement);
        } else {
          container.appendChild(dragging);
        }
      });

      container.addEventListener("drop", e => {
        e.preventDefault();
        updateTaskOrder();
      });
    }

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll(".task:not(.dragging)")];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        }
        return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function updateTaskOrder() {
      const newOrder = Array.from(document.querySelectorAll(".task")).map((el, i) => ({
        id: el.dataset.id,
        order: Date.now() + i * 1000
      }));

      newOrder.forEach(({id, order}) => {
        const task = tasks.find(t => t.id === id);
        if (task) task.order = order;
      });

      saveToDrive();
      renderTasks(document.getElementById("searchInput").value);
    }

    function setupListeners() {
      document.getElementById("addBtn").onclick = () => addTask(document.getElementById("taskInput").value);
      document.getElementById("taskInput").onkeypress = e => {
        if (e.key === "Enter") addTask(document.getElementById("taskInput").value);
      };
      document.getElementById("searchInput").oninput = () => renderTasks(document.getElementById("searchInput").value);

      document.getElementById("deleteSelectedBtn").onclick = deleteSelected;
      document.getElementById("clearCompletedBtn").onclick = clearCompleted;
    }

    // Initialize
    window.onload = () => {
      initGoogle();
      setupListeners();
    };
  </script>
</body>
</html>
